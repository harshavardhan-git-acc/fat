<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold Rate Tracker</title>
    <!-- CORRECTED LINK BELOW -->
    <script src="https://jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding-top: 50px; }
        .container { width: 80%; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gold Rate Statistics (Last 1 Year)</h1>
        <canvas id="goldChart"></canvas>
    </div>
    <script>
        const ctx = document.getElementById('goldChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar'],
                datasets: [{
                    label: 'Price (per 10g in ₹)',
                    data: [72000, 74000, 73500, 75000, 77000, 79000, 82000, 85000, 88000, 92000, 95000, 98000],
                    borderColor: '#FFD700',
                    backgroundColor: 'rgba(255, 215, 0, 0.2)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: { beginAtZero: false }
                }
            }
        });
    </script>
</body>
</html>
