<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gold Rate Tracker</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding-top: 20px; }
        .container { width: 80%; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        canvas { background: #fff; width: 100%; max-width: 800px; height: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gold Rate Statistics (Last 1 Year)</h1>
        <canvas id="goldCanvas" width="800" height="400"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('goldCanvas');
        const ctx = canvas.getContext('2d');

        const data = [72000, 74000, 73500, 75000, 77000, 79000, 82000, 85000, 88000, 92000, 95000, 98000];
        const labels = ['Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec', 'Jan', 'Feb', 'Mar'];
        
        const padding = 50;
        const width = canvas.width - padding * 2;
        const height = canvas.height - padding * 2;
        const maxVal = Math.max(...data);
        const minVal = Math.min(...data);

        // Draw Axes
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, height + padding);
        ctx.lineTo(width + padding, height + padding);
        ctx.stroke();

        // Draw Line
        ctx.beginPath();
        ctx.strokeStyle = 'gold';
        ctx.lineWidth = 3;
        ctx.fillStyle = 'rgba(255, 215, 0, 0.2)';

        data.forEach((val, i) => {
            const x = padding + (i * (width / (data.length - 1)));
            const y = (height + padding) - ((val - minVal) / (maxVal - minVal) * height);
            
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
            
            // Draw Dots
            ctx.fillRect(x-3, y-3, 6, 6);
        });
        ctx.stroke();

        // Labels
        ctx.fillStyle = "black";
        ctx.font = "12px Arial";
        labels.forEach((label, i) => {
            const x = padding + (i * (width / (labels.length - 1)));
            ctx.fillText(label, x - 10, height + padding + 20);
        });
    </script>
</body>
</html>
