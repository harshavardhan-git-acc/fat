apiVersion: apps/v1
kind: Deployment
metadata:
  name: gold-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gold-app
  template:
    metadata:
      labels:
        app: gold-app
    spec:
      containers:
      - name: gold-container
        image: harshavardhandwaraka/gold-app:latest
---
apiVersion: v1
kind: Service
metadata:
  name: gold-service
spec:
  type: NodePort
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30008
  selector:
    app: gold-app
